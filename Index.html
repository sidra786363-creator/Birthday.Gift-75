


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6ec4,#7873f5,#42e695);
background-size:400% 400%;
animation:bgMove 12s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

.container{
text-align:center;
padding:30px;
width:90%;
max-width:420px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,.3);
z-index:10;
position:relative;
}

h1{
font-family:'Pacifico',cursive;
font-size:2.8rem;
color:#fff;
margin-bottom:10px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

h2{
color:white;
font-size:1.4rem;
margin-bottom:15px;
}

p{
color:#fff;
font-size:1rem;
line-height:1.7;
margin-bottom:25px;
}

button{
padding:14px 30px;
border:none;
border-radius:40px;
background:#fff;
color:#ff4081;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
background:#ffe7f1;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

/* Balloons */

.balloon{
position:absolute;
bottom:-150px;
width:60px;
height:80px;
border-radius:50%;
animation:float 8s linear infinite;
}

.balloon:after{
content:"";
position:absolute;
width:2px;
height:80px;
background:#fff;
left:50%;
top:80px;
}

.balloon1{
left:10%;
background:#ff4d6d;
animation-delay:0s;
}

.balloon2{
left:30%;
background:#ffd60a;
animation-delay:2s;
}

.balloon3{
left:70%;
background:#00f5d4;
animation-delay:4s;
}

.balloon4{
left:90%;
background:#9b5de5;
animation-delay:1s;
}

@keyframes float{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-120vh);
}

}

/* Mobile */

@media(max-width:500px){

h1{
font-size:2.2rem;
}

h2{
font-size:1.2rem;
}

p{
font-size:.95rem;
}

.container{
padding:25px;
}

button{
width:100%;
}

}

</style>

</head>

<body>

<canvas id="confetti"></canvas>

<div class="balloon balloon1"></div>
<div class="balloon balloon2"></div>
<div class="balloon balloon3"></div>
<div class="balloon balloon4"></div>

<div class="container">

<h1>🎂 Happy Birthday 🎉</h1>

<h2>Dear Friend ❤️</h2>

<p>
May your birthday be filled with endless happiness,
beautiful memories,
love, laughter,
and all the success you deserve.
Have a wonderful year ahead!
🥳🎁🎈
</p>

<button onclick="celebrate()">
🎉 Celebrate
</button>

</div>

<script>

// Confetti

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let confetti=[];

function randomColor(){

const colors=[
"#ff4d6d",
"#ffd60a",
"#00f5d4",
"#9b5de5",
"#ffffff",
"#00bbf9"
];

return colors[Math.floor(Math.random()*colors.length)];

}

for(let i=0;i<250;i++){

confetti.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height-canvas.height,
r:Math.random()*6+4,
d:Math.random()*250,
color:randomColor(),
tilt:Math.random()*10,
tiltAngle:0,
speed:Math.random()*3+2

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

confetti.forEach(c=>{

ctx.beginPath();

ctx.fillStyle=c.color;

ctx.fillRect(c.x,c.y,c.r,c.r);

});

update();

requestAnimationFrame(draw);

}

function update(){

confetti.forEach(c=>{

c.y+=c.speed;

c.tiltAngle+=0.1;

c.x+=Math.sin(c.tiltAngle);

if(c.y>canvas.height){

c.y=-20;
c.x=Math.random()*canvas.width;

}

});

}

draw();

function celebrate(){

for(let i=0;i<150;i++){

confetti.push({

x:Math.random()*canvas.width,
y:-20,
r:Math.random()*7+3,
d:Math.random()*250,
color:randomColor(),
tilt:0,
tiltAngle:0,
speed:Math.random()*5+3

});

}

alert("🎉 Happy Birthday! Have an amazing day! 🎂❤️");

}

window.onresize=()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

}

</script>

</body>
</html>
